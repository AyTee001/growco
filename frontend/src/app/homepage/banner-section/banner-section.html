<div class="banner-section-wrapper">
  <div class="banner-section">
    <!-- Ліва карусель -->
    <div class="left-carousel">
      <div class="swiper" #swiperContainer>
        <div class="swiper-wrapper">
          @for (img of leftImages; track img) {
          <div class="swiper-slide">
            <img [src]="img" alt="banner">
          </div>
          }
        </div>
        <!-- Кнопки навігації -->
        <div class="banner-swiper-button-prev"></div>
        <div class="banner-swiper-button-next"></div>
        <!-- Пагінація -->
        <div class="swiper-pagination"></div>
      </div>
    </div>

    <div class="right-list">
      @for (card of rightCards; track card.id) {
      <div class="banner-card" (click)="onCardClick(card)" [attr.data-id]="card.id">

        <div class="card-text">
          <span class="title">{{ card.title }}</span>
        </div>

        <div class="image-container">
          <img [src]="card.imageUrl" [alt]="card.title">
        </div>

        <mat-icon class="arrow-icon">chevron_right</mat-icon>
      </div>
      }
    </div>
  </div>
</div>
