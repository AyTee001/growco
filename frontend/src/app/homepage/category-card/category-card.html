<mat-card class="category-card">
    <mat-card-content class="category-card__content">
      <h3 class="category-card__title">
        {{ title() }}
      </h3>
  
      <div class="category-card__image-wrapper">
        <img
          class="category-card__image"
          [src]="image()"
          [alt]="alt()"
        />
      </div>
    </mat-card-content>
  </mat-card>
