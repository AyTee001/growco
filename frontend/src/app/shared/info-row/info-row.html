<div class="info-row-wrap">
  <button type="button" class="info-row" (click)="onActivate()" [attr.aria-label]="label + ': змінити'">
    <div class="info-row__text">
      <span class="info-row__label">{{ label }}</span>
      <span class="info-row__value" [class.info-row__value--muted]="isEmpty">{{ displayValue }}</span>
    </div>
    <span class="info-row__action material-symbols-outlined" aria-hidden="true">{{ actionIcon }}</span>
  </button>
  @if (showDivider) {
    <div class="info-row__divider" role="presentation"></div>
  }
</div>
