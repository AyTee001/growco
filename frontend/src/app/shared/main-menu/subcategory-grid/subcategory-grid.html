<div class="grid-content">
  @let cat = category();

  <div class="grid">
    @for (sub of cat.subCategories; track sub.categoryId) {
      <div class="category-card" [style.backgroundColor]="cat.accentColor ? cat.accentColor : '#FFE3E3'">
        <span class="label">{{ sub.name }}</span>
        <img [src]="'uploads/' + sub.imgUrl" [alt]="sub.name">
      </div>
    }
  </div>
</div>
