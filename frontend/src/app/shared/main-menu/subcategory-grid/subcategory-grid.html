<div class="grid-content">
  @let cat = category();

  <div class="grid">
    @for (sub of cat.subCategories; track sub.categoryId) {
      <div class="category-card" [style.backgroundColor]="'#FFE3E3'"> <!--Add according property to the data model-->
        <span class="label">{{ sub.name }}</span>
        <img [src]="sub.imgUrl" [alt]="sub.name">
      </div>
    }
  </div>
</div>
