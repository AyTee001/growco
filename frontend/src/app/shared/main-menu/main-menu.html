<div class="menu-page">
    <div class="menu-container">
        <app-sidebar-nav [menuData]="categoryTree()" [activeId]="selectedCategoryId()" (selectionChange)="selectedCategoryId.set($event)">
        </app-sidebar-nav>

        <app-subcategory-grid [category]="activeCategory()" (closeMainMenu)="closeMenu()">
        </app-subcategory-grid>
    </div>

    <div class="brand-strip">
        <a mat-icon-button routerLink="/about-us" class="about-btn" title="Про нас" (click)="closeMenu()">
            <mat-icon>info</mat-icon>
        </a>

        <div class="divider"></div>

        <div class="brands-container">
            @for (brand of brands(); track brand.id) {
            <div class="brand-item">
                <img [src]="'images/main-menu/brands/' + brand.logoFile" [alt]="brand.name">
            </div>
            }
        </div>

        <button mat-icon-button class="close-btn" (click)="closeMenu()" aria-label="Close menu">
            <mat-icon>close</mat-icon>
        </button>
    </div>

</div>
