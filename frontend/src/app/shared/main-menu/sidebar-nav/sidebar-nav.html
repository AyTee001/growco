<mat-nav-list class="sidebar">
    @for (cat of menuData(); track cat.categoryId) {
    <a mat-list-item [activated]="activeId() === cat.categoryId" (click)="selectionChange.emit(cat.categoryId)">

        <div matListItemIcon class="category-icon"
            [style.--icon]="'url( uploads/' + cat.imgUrl + ')'"></div>
        <span matListItemTitle>{{ cat.name }}</span>

        <div matListItemMeta style="display: flex; align-items: center; justify-content: center;">
            <mat-icon>chevron_right</mat-icon>
        </div>
    </a>
    }
</mat-nav-list>
