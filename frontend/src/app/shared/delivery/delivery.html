<div class="dialog-container">
  <header class="dialog-header">
    <div class="header-title">
      <div class="active-badge">Самовивіз</div>
    </div>
    
    <button class="close-btn" mat-dialog-close aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="dialog-body">
    
    <aside class="left-panel">
      <h2>Оберіть магазин</h2>
      
      <div class="search-input-wrapper">
        <mat-icon class="input-icon">search</mat-icon>
        <input 
          type="text" 
          placeholder="Знайти магазин..."
          [(ngModel)]="searchQuery"
          (input)="filterStores()">
          
        <button 
          class="clear-btn" 
          *ngIf="searchQuery" 
          (click)="searchQuery = ''; filterStores()" 
          aria-label="Clear input">
          <mat-icon class="input-icon">cancel</mat-icon>
        </button>
      </div>
      
      <div class="store-list">
        <div 
          *ngFor="let store of filteredStores" 
          class="store-list-item"
          [class.active]="selectedStore?.id === store.id"
          (click)="selectStore(store)">
          
          <div class="store-info">
            <h4>{{ store.name }}</h4>
            <p>{{ store.address }}</p>
          </div>
          <mat-icon *ngIf="selectedStore?.id === store.id" class="check-icon">check_circle</mat-icon>
        </div>

        <div *ngIf="filteredStores.length === 0" class="no-results">
          Магазинів не знайдено
        </div>
      </div>
    </aside>

    <main class="right-panel">
      <div id="pickup-map" class="map-image"></div>
    </main>
    
  </div>
</div>
