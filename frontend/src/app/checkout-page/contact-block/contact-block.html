<div class="contact-card">
  <div class="contact-content" [formGroup]="contactForm">
    
    <div class="user-profile">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Ім'я</mat-label>
        <input 
          matInput 
          #newName 
          [value]="userName" 
          (input)="saveUserData(newName.value, newPhone.value)" 
          placeholder="Наприклад, Іван Петренко">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Телефон</mat-label>
        <input 
          matInput 
          #newPhone 
          [value]="userPhone" 
          (input)="saveUserData(newName.value, newPhone.value)" 
          placeholder="+380 99 123 45 67">
      </mat-form-field>
    </div>

    <div class="comment-field">
      <textarea
        formControlName="comment"
        placeholder="Коментар для збиральника"
        rows="3"
      ></textarea>
      <div class="counter">{{ commentLength }}/500</div>
    </div>

    <div class="toggle-wrapper">
      <div class="wave"></div>
      <div class="switch-row">
        <mat-slide-toggle formControlName="noPaperReceipt">
          Без паперового чека
        </mat-slide-toggle>
      </div>
    </div>
  </div>
</div>
