<div class="profile-page">
  <div class="profile-page__container">
    
    <ng-container *ngIf="isLoading; else content">
      <div class="profile-skeleton">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    </ng-container>

    <ng-template #content>
      <section class="profile-summary">
        <div class="profile-summary__avatar">
          <span class="material-symbols-outlined">person</span>
        </div>

        <div class="profile-summary__info">
          <h3 class="profile-summary__name">{{ user.fullName || 'Гість' }}</h3>
          <p class="profile-summary__phone">{{ user.phone }}</p>

          <div class="profile-summary__actions">
            <a class="btn-secondary" routerLink="/account/my-data">Мої дані</a>
            <button class="btn-outline" (click)="logout()">Вийти</button>
          </div>
        </div>
      </section>

      <section class="profile-cards">
        
        <article *ngIf="ordersCount === 0" class="profile-card profile-card--empty">
          <h3 class="profile-card__title">Мої замовлення</h3>
          <p class="profile-card__text">
            Оце так 🙂<br>
            Жодної покупочки онлайн в «Grovco».<br>
            Спробуйте, маємо для вас круті пропозиції!
          </p>
          <a class="profile-card__action" routerLink="/product-catalog">
            <span>Замовити</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </a>
        </article>

        <article *ngIf="ordersCount > 0" class="profile-card">
          <h3 class="profile-card__title">Мої замовлення</h3>
          <p class="profile-card__text">У вас є {{ ordersCount }} активних замовлень.</p>
          <a class="profile-card__action" routerLink="/account/orders">
            <span>Переглянути всі</span>
            <span class="material-symbols-outlined">chevron_right</span>
          </a>
        </article>

      </section>
    </ng-template>
  </div>
</div>
