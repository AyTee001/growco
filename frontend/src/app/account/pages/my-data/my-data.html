<div class="my-data-page">
  <div class="profile-card">
    <div class="profile-card__header">
      <h2 class="profile-card__title">Особисті дані</h2>
      <p class="profile-card__subtitle">Керуйте інформацією вашого профілю</p>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSave()" class="data-form">
      <div class="data-form__section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Повне ім'я</mat-label>
          <input matInput formControlName="name" placeholder="Іван Іванов">
          <mat-error *ngIf="userForm.get('name')?.hasError('required')">Ім'я обов'язкове</mat-error>
          <mat-error *ngIf="userForm.get('name')?.hasError('minlength')">Мінімум 2 символи</mat-error>
          <mat-error *ngIf="userForm.get('name')?.hasError('pattern')">Ім'я може містити лише літери</mat-error>
        </mat-form-field>

        <div class="phone-input-wrapper">
          <ngx-material-intl-tel-input
            [fieldControl]="$any(userForm.get('phone'))"
            [required]="true"
            [appearance]="'outline'"
            [hidePhoneIcon]="true"
            [visibleCountries]="['ua']"
            [autoSelectedCountry]="'ua'"
            [autoIpLookup]="false"
            [outputNumberFormat]="0"
            [textLabels]="textLabels"
          >
          </ngx-material-intl-tel-input>
        </div>

        <mat-form-field appearance="outline" class="full-width readonly-field">
          <mat-label>Електронна пошта (незмінно)</mat-label>
          <input matInput formControlName="email" readonly>
          <span matSuffix class="material-symbols-outlined lock-icon">lock</span>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-flat-button class="submit-btn" type="submit" [disabled]="userForm.invalid || userForm.pristine">
          Зберегти зміни
        </button>
      </div>
    </form>
  </div>
</div>
