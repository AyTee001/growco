<div class="my-data-container">
  <div class="my-data-header">
    <h2>Особисті дані</h2>
    <p>Керуйте інформацією вашого профілю</p>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="onSave()" class="data-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Повне ім'я</mat-label>
      <input matInput formControlName="name" placeholder="Іван Іванов">
      <mat-error *ngIf="userForm.get('name')?.hasError('required')">Це поле обов'язкове</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Номер телефону</mat-label>
      <input matInput formControlName="phone" placeholder="+380...">
      <mat-hint>Формат: +380XXXXXXXXX</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width readonly-field">
      <mat-label>Електронна пошта (незмінно)</mat-label>
      <input matInput formControlName="email">
      <span matSuffix class="material-symbols-outlined lock-icon">lock</span>
    </mat-form-field>

    <div class="form-actions">
      <button mat-flat-button color="primary" type="submit" [disabled]="userForm.invalid || userForm.pristine">
        Зберегти зміни
      </button>
    </div>
  </form>
</div>
