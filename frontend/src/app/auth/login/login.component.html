<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <div class="logo">
          <img src="/logo-no-bg2.png" alt="Growco" width="420" />
        </div>
        <h1>Ласкаво просимо!</h1>
      </mat-card-title>
      <mat-card-subtitle>Увійдіть у свій обліковий запис</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="error-message" [class.hidden]="!errorMessage">
          {{ errorMessage }}
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required email #emailModel="ngModel">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="submitted && emailModel.errors?.['required']">Email обов'язковий</mat-error>
          <mat-error *ngIf="submitted && emailModel.errors?.['email']">Введіть коректний email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Пароль</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" name="password" [(ngModel)]="password" required #passwordModel="ngModel">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="submitted && passwordModel.errors?.['required']">Пароль обов'язковий</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="submit-btn" type="submit" [disabled]="loading">
          {{ loading ? 'Вхід...' : 'Увійти' }}
        </button>

        <p class="register-link">
          Немає акаунта? <a routerLink="/register">Зареєструватися</a>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</div>
