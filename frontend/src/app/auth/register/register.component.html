<form (ngSubmit)="onSubmit()" #registerForm="ngForm">

  <div class="form-group">
    <label for="name">Ім'я *</label>
    <input type="text" id="name" name="name" [(ngModel)]="name" required />
    <div *ngIf="submitted && !name" class="error">Ім'я обов'язкове</div>
  </div>

  <div class="form-group">
    <label for="phoneNumber">Телефон *</label>
    <input type="tel" id="phoneNumber" name="phoneNumber" [(ngModel)]="phoneNumber" required />
    <div *ngIf="submitted && !phoneNumber" class="error">Телефон обов'язковий</div>
  </div>

  <div class="form-group">
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" [(ngModel)]="email" required email />
    <div *ngIf="submitted && !email" class="error">Email обов'язковий</div>
    <div *ngIf="submitted && email && !email.includes('@')" class="error">Введіть коректний email</div>
  </div>

  <div class="form-group">
    <label for="password">Пароль *</label>
    <input type="password" id="password" name="password" [(ngModel)]="password" required minlength="6" />
    <div *ngIf="submitted && !password" class="error">Пароль обов'язковий</div>
    <div *ngIf="submitted && password && password.length < 6" class="error">Пароль має містити щонайменше 6 символів</div>
  </div>

  <div class="form-group">
    <label for="confirmPassword">Підтвердження пароля *</label>
    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required />
    <div *ngIf="submitted && confirmPassword !== password" class="error">Паролі не співпадають</div>
  </div>

  <!-- Блок помилки (завжди в DOM, але прихований, якщо немає тексту) -->
  <div class="error-message" [class.hidden]="!errorMessage">
    {{ errorMessage }}
  </div>

  <button type="submit" [disabled]="loading">Зареєструватися</button>
  <p>Вже є акаунт? <a routerLink="/login">Увійти</a></p>
</form>
